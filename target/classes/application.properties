spring.application.name=food-ordering-api
server.port=8080

spring.datasource.url=jdbc:h2:mem:foodorder
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=${JWT_SECRET:change-this-development-secret-to-something-long-and-random-for-production-use}
app.jwt.expiration-ms=86400000

# Hosted payments (redirect). Set keys for gateways you use; leave blank to get a clear 503 from initiate.
app.payment.frontend-base-url=${PAYMENT_FRONTEND_URL:http://localhost:5173}
app.payment.stripe-secret-key=${STRIPE_SECRET_KEY:}
app.payment.razorpay-key-id=${RAZORPAY_KEY_ID:}
app.payment.razorpay-key-secret=${RAZORPAY_KEY_SECRET:}
app.payment.paypal-client-id=${PAYPAL_CLIENT_ID:}
app.payment.paypal-client-secret=${PAYPAL_CLIENT_SECRET:}
app.payment.paypal-mode=${PAYPAL_MODE:sandbox}
app.payment.usd-to-inr-rate=${USD_TO_INR_RATE:83}
